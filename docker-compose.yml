version: "3.8"
services:
  skyvern:
    image: public.ecr.aws/skyvern/skyvern:latest
    ports:
      - "8000:8000"
    environment:
      # Use GitHub Models Azure endpoint (OpenAI compatible)
      - LLM_PROVIDER=openai
      - OPENAI_API_KEY=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
      - OPENAI_BASE_URL=https://models.inference.ai.azure.com
      - LLM_MODEL=gpt-4o-mini
      
      - BROWSER_TYPE=chromium
      - MAX_SCRAPING_RETRIES=3
    volumes:
      - ./cookies:/app/cookies
      - ./screenshots:/app/screenshots
      - ./downloads:/app/downloads
      - ./artifacts:/data/artifacts
      - ./videos:/data/videos
      - ./har:/data/har
    deploy:
      resources:
        limits:
          memory: 5G
          cpus: "3.5"

  skyvern-ui:
    image: public.ecr.aws/skyvern/skyvern-ui:latest
    restart: on-failure
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./artifacts:/data/artifacts
      - ./videos:/data/videos
      - ./har:/data/har
    environment:
      - VITE_BROWSER_STREAMING_MODE=cdp
      - VITE_WSS_BASE_URL=ws://79.143.190.33:8000/api/v1
      - VITE_API_BASE_URL=http://79.143.190.33:8000/api/v1
      - VITE_ARTIFACT_API_BASE_URL=http://79.143.190.33:9090
    depends_on:
      - skyvern
